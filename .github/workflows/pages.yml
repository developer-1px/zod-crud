name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Verify workspace
        run: npm run verify
      - name: Build site
        env:
          SITE_BASE: /zod-crud/
          SITE_URL: https://developer-1px.github.io/zod-crud
        run: npm run playground:build
      - name: Evaluate site artifact
        env:
          SITE_BASE: /zod-crud/
        run: npm run site:evaluate
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Evaluate live site
        env:
          SITE_URL: ${{ steps.deployment.outputs.page_url }}
          SITE_LIVE_ATTEMPTS: "18"
          SITE_LIVE_DELAY_MS: "10000"
        run: npm run site:evaluate:live
